const data = {

          { text: "明确定义的<em>动作</em>将状态转移 (well-defined actions)" },
          { text: "<em>目标状态</em> (goal state) 和 <em>效用函数</em> (utility function)" },
          { text: "<em>确定性搜索</em> (deterministic search)" },
        ]},
        { text: "在<strong>人工世界</strong>（游戏、Shakey 机器人的受控环境）中效果很好 <span class='tag tag-example'>例子</span>" },

          { text: "需要处理<em>不确定性、模糊性、未知</em> (uncertainty, ambiguity, unknown)" },
          { text: "需要处理<em>不断变化的世界</em> (changing world)" },
          { text: "需要处理<em>近似</em> (approximation)——不需要精确解" },
          { text: "需要<em>柔韧性</em>而非脆弱性 (pliant vs brittle) <span class='tag tag-term'>术语</span>" },
          { text: "需要<em>优雅退化</em> (graceful degradation)：性能逐渐下降而不是突然崩溃 <span class='tag tag-term'>术语</span>" },

        { text: "传统计算在这些方面表现非常差！" },

        { text: "<strong>自然界的适应案例</strong> <span class='tag tag-example'>例子</span>", children: [
          { text: "南极鱼：血液中含有\"防冻\"蛋白质（生化层面的长期进化适应）" },

        ]},
      ]
    },
    {
      text: "四、自然界的适应机制 (Mechanisms of Adaptation)",

        { text: "学习和进化是两大主要机制，但实际远比这复杂 <span class='tag tag-concept'>核心概念</span>" },
        { text: "<strong>两个分析轴</strong>", children: [
          { text: "轴 1 — <em>时间跨度</em> (Timespan)：短期（个体生命周期）⇔ 长期（物种，千年）" },

          { text: "<strong>进化 (Evolution)</strong>：物种层面，时间跨度以千年计 <span class='tag tag-term'>术语</span>", children: [

            { text: "技术正在改变进化进程：基因图谱绘制、基因修改、基因治疗" },
            { text: "对应计算：<em>进化算法（遗传算法、遗传编程等）</em>" },
          ]},

      ]

    {
      text: "五、重新定义\"智能\"：非人类中心的视角",

        { text: "<strong>替代性智能定义</strong>：在个体/群体所处的环境中，发展出生存和繁荣所需能力的过程 <span class='tag tag-concept'>核心概念</span>" },
        { text: "EGO（人类中心）vs ECO（生态视角）：人类不再站在所有生物之上，而是网络中平等的一员" },
        { text: "这个视角的转变对 AI 研究意义深远——蚂蚁、蜜蜂等也展现了某种\"智能\"，其策略可启发计算方法 <span class='tag tag-key'>重点</span>" },
      ]
    },
    {
      text: "六、从\"智能\"到自适应系统——计算领域的范式转移",

        { text: "代表了一种根本性的计算思维变革 <span class='tag tag-key'>重点</span>", children: [
          { text: "从\"精确编程告诉计算机每一步做什么\"→\"让计算系统自己学习和适应\"" },

    },

      text: "七、别名一：计算智能 (Computational Intelligence, CI) <span class='tag tag-field'>子领域</span>",

          { text: "<strong>神经网络 (Neural Networks)</strong>：模拟大脑中神经元的连接和信号传递" },

let allNodes = [];

function renderTree(node, level, parentEl) {
  const div = document.createElement('div');
  div.className = `node level-${level}` + (node.children ? '' : ' leaf');

  const header = document.createElement('div');
  header.className = 'node-header';

  const toggle = document.createElement('span');
  toggle.className = 'node-toggle';
  toggle.textContent = node.children ? '−' : '•';

  const text = document.createElement('span');
  text.className = 'node-text';
  text.innerHTML = node.text;

  header.appendChild(toggle);
  header.appendChild(text);
  div.appendChild(header);

  let childContainer = null;
  if (node.children) {
    childContainer = document.createElement('div');
    childContainer.className = 'node-children';
    node.children.forEach(c => renderTree(c, level + 1, childContainer));
    div.appendChild(childContainer);

    header.addEventListener('click', () => {
      const collapsed = childContainer.classList.toggle('collapsed');
      toggle.textContent = collapsed ? '+' : '−';
    });
  }

  allNodes.push({ div, childContainer, toggle, level });
  parentEl.appendChild(div);
}

function toggleAll(expand) {
  allNodes.forEach(n => {
    if (n.childContainer) {
      if (expand) {
        n.childContainer.classList.remove('collapsed');
        n.toggle.textContent = '−';
      } else {
        n.childContainer.classList.add('collapsed');
        n.toggle.textContent = '+';
      }
    }
  });
}

function expandLevel(targetLevel) {
  allNodes.forEach(n => {
    if (n.childContainer && n.level <= targetLevel) {
      n.childContainer.classList.remove('collapsed');
      n.toggle.textContent = '−';
    }
  });
}

const tree = document.getElementById('tree');
data.children.forEach(c => renderTree(c, 0, tree));
