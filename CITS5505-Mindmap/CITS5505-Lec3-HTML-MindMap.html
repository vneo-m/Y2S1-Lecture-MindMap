let allNodes = [];

function renderTree(node, level, parentEl) {
  const div = document.createElement('div');
  div.className = `node level-${level}` + (node.children ? '' : ' leaf');

  const header = document.createElement('div');
  header.className = 'node-header';

  const toggle = document.createElement('span');
  toggle.className = 'node-toggle';
  toggle.textContent = node.children ? '\u2212' : '\u2022';

  const text = document.createElement('span');
  text.className = 'node-text';
  text.innerHTML = node.text;

  header.appendChild(toggle);
  header.appendChild(text);
  div.appendChild(header);

  let childContainer = null;
  if (node.children) {
    childContainer = document.createElement('div');
    childContainer.className = 'node-children';
    node.children.forEach(c => renderTree(c, level + 1, childContainer));
    div.appendChild(childContainer);

    header.addEventListener('click', () => {
      const collapsed = childContainer.classList.toggle('collapsed');
      toggle.textContent = collapsed ? '+' : '\u2212';
    });
  }

  allNodes.push({ div, childContainer, toggle, level });
  parentEl.appendChild(div);
}

function toggleAll(expand) {
  allNodes.forEach(n => {
    if (n.childContainer) {
      if (expand) {
        n.childContainer.classList.remove('collapsed');
        n.toggle.textContent = '\u2212';
      } else {
        n.childContainer.classList.add('collapsed');
        n.toggle.textContent = '+';
      }
    }
  });
}

function expandLevel(targetLevel) {
  allNodes.forEach(n => {
    if (n.childContainer && n.level <= targetLevel) {
      n.childContainer.classList.remove('collapsed');
      n.toggle.textContent = '\u2212';
    }
  });
}

const tree = document.getElementById('tree');
data.children.forEach(c => renderTree(c, 0, tree));
