<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y2S1 Lecture MindMap</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: #f0f4f8;
    color: #111111;
    min-height: 100vh;
  }

  .header {
    text-align: center;
    padding: 60px 20px 30px;
    position: relative;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #4a90d9, transparent);
  }

  .header h1 {
    font-size: 2em;
    font-weight: 700;
    background: linear-gradient(135deg, #2270b8, #1a96c8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }

  .header .subtitle {
    font-size: 0.9em;
    color: #5a6a80;
    margin-top: 10px;
    font-weight: 300;
  }

  .container {
    max-width: 900px;
    margin: 50px auto;
    padding: 0 20px;
  }

  .section {
    margin-bottom: 40px;
  }

  .section-title {
    font-size: 1em;
    font-weight: 700;
    color: #2270b8;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid #d0daea;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 20px;
  }

  .card {
    background: #ffffff;
    border: 1px solid #d0daea;
    border-radius: 12px;
    padding: 24px 20px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card:hover {
    border-color: #4a90d9;
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(74, 144, 217, 0.15);
  }

  .card-icon {
    font-size: 1.6em;
  }

  .card-title {
    font-size: 1em;
    font-weight: 500;
    color: #111111;
    font-family: 'JetBrains Mono', monospace;
    word-break: break-all;
  }

  .card-label {
    font-size: 0.75em;
    color: #2270b8;
    background: rgba(74, 144, 217, 0.1);
    border-radius: 4px;
    padding: 2px 8px;
    width: fit-content;
  }

  .status {
    text-align: center;
    padding: 60px 20px;
    color: #5a6a80;
    font-size: 0.9em;
  }

  .status.error {
    color: #c0392b;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #ccd6e8;
    border-top-color: #4a90d9;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  footer {
    text-align: center;
    padding: 40px 20px;
    color: #8a9abb;
    font-size: 0.75em;
  }
</style>
</head>
<body>

<div class="header">
  <h1>Y2S1 Lecture MindMaps</h1>
  <p class="subtitle">UWA Y2S1 — CITS4401 · CITS4404 · CITS5505 · CITS5508</p>
</div>

<div class="container">
  <div id="content">
    <div class="status">
      <div class="spinner"></div>
      加载中…
    </div>
  </div>
</div>

<footer>自动从 GitHub 仓库读取文件列表</footer>

<script>
  const REPO = 'vneo-m/Y2S1-Lecture-MindMap';
  const API  = `https://api.github.com/repos/${REPO}/contents/`;

  function formatName(filename) {
    return filename
      .replace(/\.html$/i, '')
      .replace(/_/g, ' ');
  }

  function guessLabel(filename) {
    const m = filename.match(/lec(\d+[a-z]*)/i);
    if (m) return `Lecture ${m[1].toUpperCase()}`;
    return 'HTML';
  }

  async function fetchGrouped(path) {
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`);
    if (!res.ok) throw new Error(`GitHub API ${res.status}`);
    const items = await res.json();

    // groups: { folderName: [file, ...], ... }  ('' = root)
    const groups = {};

    for (const item of items) {
      if (item.type === 'dir') {
        const sub = await fetchGrouped(item.path);
        // merge sub-groups under this folder's name
        for (const [key, files] of Object.entries(sub)) {
          const groupKey = key ? `${item.name}/${key}` : item.name;
          groups[groupKey] = files;
        }
      } else if (
        item.type === 'file' &&
        item.name.toLowerCase().endsWith('.html') &&
        item.name.toLowerCase() !== 'index.html'
      ) {
        const folder = path || '(根目录)';
        groups[folder] = groups[folder] || [];
        groups[folder].push(item);
      }
    }
    return groups;
  }

  async function load() {
    const el = document.getElementById('content');
    try {
      const groups = await fetchGrouped('');

      if (Object.keys(groups).length === 0) {
        el.innerHTML = '<div class="status">暂无文件</div>';
        return;
      }

      const sections = Object.entries(groups).map(([folder, files]) => {
        const cards = files.map(f => `
          <a class="card" href="${f.path}">
            <div class="card-icon">🗺️</div>
            <div class="card-title">${formatName(f.name)}</div>
            <div class="card-label">${guessLabel(f.name)}</div>
          </a>
        `).join('');
        return `
          <div class="section">
            <div class="section-title">${folder}</div>
            <div class="grid">${cards}</div>
          </div>
        `;
      }).join('');

      el.innerHTML = sections;
    } catch (err) {
      el.innerHTML = `<div class="status error">加载失败：${err.message}<br><small>请确认网络连接或仓库是否为公开状态</small></div>`;
    }
  }

  load();
</script>
</body>
</html>
